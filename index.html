<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dream House">
<meta name="robots" content="noindex,noarchive">
<meta name="theme-color" content="#f7d6e8">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<title>Dream House</title>
<style>
  :root{
    --pink:#ff5fa2; --pink-deep:#e63d86; --yellow:#ffd23f; --mint:#5fd6b4;
    --lav:#b79cff; --sky1:#ffe3f1; --sky2:#dcefff; --cream:#fff8f0;
    --ink:#5a3d52; --soft:#ffffffd9; --shadow:rgba(120,60,100,.22);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;touch-action:manipulation;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:'ui-rounded','SF Pro Rounded','Hiragino Maru Gothic ProN','Comic Sans MS','Chalkboard SE',sans-serif;
    background:linear-gradient(160deg,var(--sky1),var(--sky2));
    color:var(--ink); position:fixed; inset:0;
  }
  #app{position:absolute; inset:0; display:flex; flex-direction:column;}
  /* ---------- TOP BAR ---------- */
  #topbar{
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:max(10px,env(safe-area-inset-top)) 16px 8px; gap:10px; z-index:30;
  }
  #title{font-size:clamp(18px,4.5vw,26px); font-weight:800; color:var(--pink-deep);
    text-shadow:0 2px 0 #fff; letter-spacing:.5px; display:flex; align-items:center; gap:8px;}
  #title svg{width:30px;height:30px;filter:drop-shadow(0 2px 3px var(--shadow));}
  .iconbtn{
    width:50px; height:50px; border:none; border-radius:50%;
    background:linear-gradient(#ffffff,#ffe9f3);
    box-shadow:0 5px 12px var(--shadow), inset 0 2px 2px #fff, inset 0 -3px 4px rgba(180,90,140,.18);
    font-size:24px; display:grid; place-items:center; cursor:pointer; transition:transform .12s ease;
  }
  .iconbtn:active{transform:scale(.88);}
  /* ---------- STAGE ---------- */
  #stage{flex:1 1 auto; position:relative; overflow:hidden; min-height:0;}
  .room{position:absolute; inset:0; display:flex; flex-direction:column;
    opacity:0; transform:scale(.97) translateY(8px); pointer-events:none; transition:opacity .3s ease, transform .3s cubic-bezier(.2,.9,.3,1.2);}
  .room.active{opacity:1; transform:none; pointer-events:auto;}
  /* ---------- BOTTOM NAV ---------- */
  #nav{
    flex:0 0 auto; display:flex; gap:6px; padding:8px 8px max(8px,env(safe-area-inset-bottom));
    overflow-x:auto; background:var(--soft); box-shadow:0 -4px 16px var(--shadow);
    backdrop-filter:blur(8px); scrollbar-width:none;
  }
  #nav::-webkit-scrollbar{display:none;}
  .navbtn{
    flex:0 0 auto; width:60px; height:64px; border:none; border-radius:18px; background:transparent;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    cursor:pointer; transition:transform .12s ease, background .2s; font-size:11px; font-weight:700;
    color:var(--ink);
  }
  .navbtn .e{width:30px;height:30px;display:block;}
  .navbtn .e svg{width:100%;height:100%;}
  .navbtn:active{transform:scale(.9);}
  .navbtn.on{background:#fff; box-shadow:0 4px 10px var(--shadow);}
  .navbtn.on .e{filter:drop-shadow(0 2px 3px var(--shadow));}
  /* ---------- GENERIC ROOM LAYOUT ---------- */
  .scene{flex:1 1 auto; position:relative; overflow:hidden; min-height:0;}
  .sceneBg{position:absolute;inset:0;width:100%;height:100%;}
  .sceneBg svg{position:absolute;inset:0;width:100%;height:100%;}
  .roomname{position:absolute; top:8px; left:50%; transform:translateX(-50%);
    background:linear-gradient(#fff,#fff0f7); padding:6px 20px; border-radius:30px; font-weight:800; font-size:16px;
    color:var(--pink-deep); box-shadow:0 6px 14px var(--shadow), inset 0 2px 2px #fff; z-index:5; white-space:nowrap;}
  .tray{flex:0 0 auto; background:linear-gradient(var(--cream),#fff3e6); padding:10px; display:flex; flex-direction:column;
    gap:8px; box-shadow:0 -4px 16px var(--shadow); max-height:42%; overflow-y:auto;}
  .tabrow{display:flex; gap:6px; overflow-x:auto; scrollbar-width:none;}
  .tabrow::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto; padding:8px 14px; border:none; border-radius:16px; background:linear-gradient(#fff,#fdeef5);
    font-weight:700; font-size:14px; color:var(--ink); box-shadow:0 3px 7px var(--shadow), inset 0 1px 1px #fff;
    cursor:pointer; transition:transform .1s;}
  .tab.on{background:linear-gradient(#ff7db5,#ff4f97); color:#fff; box-shadow:0 4px 9px rgba(230,61,134,.4), inset 0 1px 1px #ffb8d8;}
  .tab:active{transform:scale(.92);}
  .swatches{display:flex; flex-wrap:wrap; gap:10px; padding-top:2px; align-content:flex-start;}
  .sw{width:54px; height:54px; border-radius:16px; border:3px solid #fff; cursor:pointer;
    box-shadow:0 4px 9px var(--shadow), inset 0 2px 3px rgba(255,255,255,.5); display:grid; place-items:center; font-size:26px;
    transition:transform .1s; flex:0 0 auto; background:#fff; overflow:hidden;}
  .sw svg{width:34px;height:34px;}
  .sw:active{transform:scale(.88);}
  .sw.sel{outline:4px solid var(--yellow); outline-offset:1px; transform:scale(1.06);}
  .bigbtn{border:none; border-radius:22px; padding:14px 22px; font-weight:800; font-size:17px;
    color:#fff; background:linear-gradient(#ff7db5,#ff4f97);
    box-shadow:0 6px 0 var(--pink-deep),0 10px 16px var(--shadow), inset 0 2px 2px #ffc2dd;
    cursor:pointer; transition:transform .1s,box-shadow .1s;}
  .bigbtn:active{transform:translateY(5px); box-shadow:0 1px 0 var(--pink-deep),0 3px 8px var(--shadow), inset 0 2px 2px #ffc2dd;}
  .bigbtn.alt{background:linear-gradient(#7fe6ca,#48c9a6); box-shadow:0 6px 0 #38b393,0 10px 16px var(--shadow), inset 0 2px 2px #c2f5e8;}
  .bigbtn.alt:active{box-shadow:0 1px 0 #38b393,0 3px 8px var(--shadow), inset 0 2px 2px #c2f5e8;}
  .bigbtn.sun{background:linear-gradient(#ffe07a,#ffcc1f); color:var(--ink); box-shadow:0 6px 0 #d9a800,0 10px 16px var(--shadow), inset 0 2px 2px #fff0bd;}
  .bigbtn.sun:active{box-shadow:0 1px 0 #d9a800,0 3px 8px var(--shadow), inset 0 2px 2px #fff0bd;}
  .btnrow{display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}
  .stagecanvas{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;}
  svg{display:block; max-width:100%; max-height:100%;}
  .idle{animation:idleFloat 3.4s ease-in-out infinite;}
  /* meter */
  .meter{position:absolute; top:12px; right:12px; background:linear-gradient(#fff,#fff0f7); padding:8px 12px; border-radius:20px;
    box-shadow:0 5px 12px var(--shadow), inset 0 1px 1px #fff; font-weight:800; font-size:14px; display:flex; align-items:center; gap:8px; z-index:6;}
  .meter svg{width:20px;height:20px;}
  .meterbar{width:90px; height:14px; background:#ffe0ec; border-radius:8px; overflow:hidden; box-shadow:inset 0 1px 2px rgba(150,80,120,.3);}
  .meterfill{height:100%; width:50%; background:linear-gradient(90deg,var(--pink),var(--yellow)); transition:width .5s ease; box-shadow:inset 0 1px 1px rgba(255,255,255,.6);}
  /* ---------- START SCREEN ---------- */
  /* scrollable + auto-margin-centered: centered when there's room, scrolls when the
     iOS keyboard shrinks the viewport (fixed centering would trap the Play button) */
  #start{position:absolute; inset:0; z-index:50; background:linear-gradient(160deg,#ffd9ec,#cdeaff);
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:18px; padding:24px; text-align:center; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  /* doubled selector so this BEATS the #start>* rule below — the backdrop must be
     absolute (out of flow), or it shoves the title/pets/Play down the page */
  #start>#startScene{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.9;}
  #start>*{position:relative;z-index:1;}
  #start h1{font-size:clamp(30px,9vw,52px); color:var(--pink-deep); text-shadow:0 3px 0 #fff,0 6px 10px var(--shadow); line-height:1.05; margin-top:auto;}
  #start .bigbtn{margin-bottom:auto;}
  #start p{font-size:18px; font-weight:700; color:var(--ink);}
  #nameInput{font-family:inherit; font-size:24px; font-weight:800; text-align:center; padding:14px 18px;
    border:4px solid var(--pink); border-radius:20px; background:#fff; color:var(--pink-deep); width:min(80vw,340px);
    box-shadow:0 8px 18px var(--shadow); -webkit-user-select:text; user-select:text;}
  #nameInput:focus{outline:none; border-color:var(--yellow);}
  .petpick{display:flex; gap:18px;}
  .petcard{width:120px; height:134px; border-radius:24px; background:linear-gradient(#fff,#fff2f8); border:5px solid #fff;
    box-shadow:0 8px 20px var(--shadow), inset 0 2px 3px #fff; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px; cursor:pointer; transition:transform .12s; font-weight:800;}
  .petcard svg{width:74px;height:74px;}
  .petcard span{font-size:18px; color:var(--ink);}
  .petcard.sel{outline:5px solid var(--yellow); transform:scale(1.06);}
  .petcard:active{transform:scale(.94);}
  /* ---------- FLOATING FX ---------- */
  .fx{position:fixed; pointer-events:none; z-index:60; will-change:transform,opacity;}
  .fx svg{width:100%;height:100%;}
  @keyframes floatUp{0%{transform:translateY(0) scale(.4); opacity:0;}
    20%{opacity:1; transform:translateY(-10px) scale(1.1);}
    100%{transform:translateY(-170px) scale(.8); opacity:0;}}
  @keyframes pop{0%{transform:scale(0) rotate(0);}60%{transform:scale(1.3) rotate(20deg);}100%{transform:scale(0) rotate(40deg); opacity:0;}}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0); opacity:1;}
    100%{transform:translateY(110vh) rotate(720deg); opacity:.9;}}
  @keyframes bounceIn{0%{transform:scale(0);}70%{transform:scale(1.15);}100%{transform:scale(1);}}
  @keyframes wiggle{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
  .wiggle{animation:wiggle .6s ease-in-out infinite;}
  @keyframes idleFloat{0%,100%{transform:translateY(0) rotate(-.6deg);}50%{transform:translateY(-10px) rotate(.6deg);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes sway{0%,100%{transform:translateX(-3px) rotate(-2deg);}50%{transform:translateX(3px) rotate(2deg);}}
  .toast{position:fixed; left:50%; top:42%; transform:translate(-50%,-50%) scale(0); z-index:70;
    background:linear-gradient(#fff,#fff0f7); color:var(--pink-deep); font-weight:900; font-size:clamp(34px,10vw,64px);
    padding:18px 36px; border-radius:40px; box-shadow:0 14px 34px var(--shadow), inset 0 2px 3px #fff; pointer-events:none;
    text-shadow:0 2px 0 #ffe3f1;}
  @keyframes toastPop{0%{transform:translate(-50%,-50%) scale(0) rotate(-8deg);}
    50%{transform:translate(-50%,-50%) scale(1.15) rotate(4deg);}
    80%{transform:translate(-50%,-50%) scale(1) rotate(0);}
    100%{transform:translate(-50%,-50%) scale(0) rotate(0); opacity:0;}}
  /* ---------- V2: ambient motion + gate + gallery + stickers + props ---------- */
  @keyframes drift{0%,100%{transform:translateX(-14px);}50%{transform:translateX(14px);}}
  .drift{animation:drift 26s ease-in-out infinite;}
  .drift2{animation:drift 34s ease-in-out infinite reverse;}
  @keyframes twk{0%,100%{opacity:.25;}50%{opacity:1;}}
  .tw{animation:twk 2.6s ease-in-out infinite;}
  .tw2{animation:twk 3.8s ease-in-out infinite .9s;}
  @keyframes steamUp{0%{transform:translateY(6px);opacity:0;}30%{opacity:.65;}100%{transform:translateY(-26px);opacity:0;}}
  .steam{animation:steamUp 4.5s ease-in-out infinite;}
  .steam2{animation:steamUp 5.6s ease-in-out infinite 1.6s;}
  @keyframes glowPulse{0%,100%{opacity:.4;}50%{opacity:1;}}
  .glow{animation:glowPulse 2.2s ease-in-out infinite;}
  .glow2{animation:glowPulse 3.1s ease-in-out infinite 1s;}
  @keyframes blinkLid{0%,93%,100%{opacity:0;}95%,97%{opacity:1;}}
  .blinkLid{animation:blinkLid 5.6s ease-in-out infinite;}
  @keyframes flashFade{0%{opacity:.95;}100%{opacity:0;}}
  #snapFlash{position:fixed;inset:0;background:#fff;z-index:80;pointer-events:none;display:none;}
  @keyframes pulse3{0%,100%{transform:scale(1);}50%{transform:scale(1.22);}}
  @keyframes discoFlash{0%,100%{filter:none;}25%{filter:brightness(1.5) hue-rotate(40deg);}60%{filter:brightness(1.3) hue-rotate(-40deg);}}
  @keyframes glowOnce{0%,100%{opacity:1;}50%{opacity:.3;}}
  .glowOnce{animation:glowOnce .6s ease 3;}
  .homeBtn{border:none;background:transparent;padding:4px;min-width:44px;min-height:44px;display:grid;place-items:center;cursor:pointer;transition:transform .12s;}
  .homeBtn svg{width:30px;height:30px;filter:drop-shadow(0 2px 3px var(--shadow));}
  .homeBtn:active{transform:scale(.88);}
  /* the home panorama may draw OUTSIDE its viewBox to fill wide screens; .scene's
     overflow:hidden clips it at the screen edge — never over the topbar or nav */
  #homeBg svg{overflow:visible;}
  .pulse3{animation:pulse3 .55s ease-in-out 3;}
  #snapBtn{position:absolute;right:14px;bottom:14px;z-index:6;width:64px;height:64px;border:none;border-radius:50%;
    background:linear-gradient(#fff,#ffe9f3);box-shadow:0 6px 14px var(--shadow),inset 0 2px 2px #fff;font-size:30px;
    display:grid;place-items:center;cursor:pointer;transition:transform .12s;}
  #snapBtn:active{transform:scale(.88);}
  #snapBtn.off{opacity:.55;}
  .prop{position:absolute;z-index:4;cursor:pointer;transition:transform .12s;}
  .prop svg{width:100%;height:100%;}
  .prop:active{transform:scale(.9);}
  .polagrid{position:absolute;inset:0;z-index:4;display:flex;flex-wrap:wrap;gap:14px;align-content:flex-start;
    justify-content:center;padding:60px 14px 16px;overflow-y:auto;}
  .polaroid{background:#fff;padding:7px 7px 18px;border-radius:6px;box-shadow:0 6px 14px var(--shadow);
    transform:rotate(-2deg);cursor:pointer;transition:transform .12s;}
  .polaroid:nth-child(2n){transform:rotate(2deg);}
  .polaroid:active{transform:scale(.92);}
  .polaroid svg{pointer-events:none;}
  .ovl{position:fixed;inset:0;z-index:90;background:rgba(90,61,82,.45);display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .ovl.on{display:flex;}
  .ovl .card{margin-top:auto;margin-bottom:auto;}   /* centered when room; scrollable under the keyboard */
  .card{background:linear-gradient(#fff,#fff3f9);border-radius:28px;padding:22px;box-shadow:0 18px 44px rgba(60,20,45,.45);
    display:flex;flex-direction:column;align-items:center;gap:14px;max-width:min(92vw,440px);max-height:86vh;overflow-y:auto;text-align:center;}
  .card h2{color:var(--pink-deep);font-size:22px;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
  .chip{border:none;border-radius:18px;padding:12px 18px;font-weight:800;font-size:17px;background:linear-gradient(#fff,#fdeef5);
    color:var(--ink);box-shadow:0 4px 9px var(--shadow);cursor:pointer;transition:transform .1s;}
  .chip:active{transform:scale(.92);}
  .chip.sel{outline:4px solid var(--yellow);}
  .chip.plain{font-size:14px;font-weight:700;background:#f3e8ee;box-shadow:none;color:#8a6a7e;}
  #holdStar{width:110px;height:110px;border:none;border-radius:50%;background:linear-gradient(#ffe07a,#ffcc1f);
    box-shadow:0 8px 0 #d9a800,0 12px 20px var(--shadow);font-size:50px;cursor:pointer;touch-action:none;
    -webkit-touch-callout:none;position:relative;overflow:hidden;display:grid;place-items:center;}
  #holdFill{position:absolute;left:0;bottom:0;width:100%;height:0%;background:rgba(255,255,255,.65);pointer-events:none;transition:height .12s linear;}
  #gateHit{position:fixed;right:2px;top:max(66px,calc(env(safe-area-inset-top) + 62px));width:28px;height:28px;z-index:9997;background:transparent;border:none;padding:0;}
  @media (prefers-reduced-motion: reduce){
    .drift,.drift2,.tw,.tw2,.steam,.steam2,.glow,.glow2,.blinkLid,.idle{animation:none;}
  }
</style>
</head>
<body>
<div id="offlineBadge" onclick="this.style.display='none'" style="display:none; position:fixed; top:max(12px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%); z-index:9999; font:700 13px/1 -apple-system,system-ui,sans-serif; padding:7px 14px; border-radius:999px; box-shadow:0 2px 10px rgba(0,0,0,.18); cursor:pointer; white-space:nowrap;"></div>
<div id="verStamp" style="position:fixed; right:7px; top:max(72px,calc(env(safe-area-inset-top) + 68px)); z-index:9998; font:700 10px/1 -apple-system,system-ui,sans-serif; color:#c98fb0; opacity:.65; pointer-events:none;">v3.2</div>
<button id="gateHit" aria-hidden="true" tabindex="-1"></button>
<div id="snapFlash"></div>
<div id="gateOverlay" class="ovl"><div class="card" id="gateCard">
  <h2>Grown-ups only! 🔒</h2>
  <p style="font-weight:700;">Hold the star for 3 seconds.</p>
  <button id="holdStar">⭐<div id="holdFill"></div></button>
  <div id="gateConfirm" style="display:none;flex-direction:column;gap:10px;align-items:center;">
    <p style="font-weight:800;">Erase everything and start over?</p>
    <button class="chip plain" id="gateYes">YES, erase</button>
  </div>
  <button class="bigbtn alt" id="gateBack">Go back to playing 🎀</button>
</div></div>
<div id="bigView" class="ovl"><div class="card" id="bigViewCard"></div></div>
<div id="nameOvl" class="ovl"><div class="card" id="nameCard"></div></div>
<div id="app">
  <div id="topbar">
    <div id="title"></div>
    <div style="display:flex;gap:10px;">
      <button class="iconbtn" id="muteBtn" aria-label="sound">🔊</button>
    </div>
  </div>
  <div id="stage"></div>
  <div id="nav"></div>
</div>
<!-- START SCREEN -->
<div id="start">
  <div id="startScene"></div>
  <h1>✨ Dream House ✨</h1>
  <p>What's your name?</p>
  <input id="nameInput" maxlength="14" placeholder="Type here" autocomplete="off" autocorrect="off">
  <p>Pick your best friend!</p>
  <div class="petpick">
    <div class="petcard" data-pet="dog"><span>Puppy</span></div>
    <div class="petcard" data-pet="cat"><span>Kitty</span></div>
  </div>
  <button class="bigbtn" id="playBtn" style="margin-top:6px;font-size:22px;padding:16px 40px;">Let's Play! 🎀</button>
</div>
<script>
"use strict";
/* =========================================================================
   SAFE STORAGE
   ========================================================================= */
const mem = {};
const Store = {
  get(k, d){ try{ const v=localStorage.getItem(k); return v==null?d:JSON.parse(v); }catch(e){ return (k in mem)?mem[k]:d; } },
  /* returns TRUE only on a real durable write — the in-memory fallback keeps the session
     playable but must never report a fake success for saved game state */
  set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); return true; }catch(e){ mem[k]=v; return false; } }
};
/* =========================================================================
   SOUND (Web Audio, fully offline)
   ========================================================================= */
let AC=null, muted=Store.get('muted',false);
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); return AC; }
function tone(freq,dur,type='sine',vol=.18){
  if(muted)return; const a=ac(); if(!a)return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(a.destination);
  const t=a.currentTime; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.02);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur); o.start(t); o.stop(t+dur);
}
const S={
  pop(){ tone(540+Math.random()*120,.12,'triangle',.16); },
  tap(){ tone(720,.08,'sine',.12); },
  sparkle(){ [880,1180,1480].forEach((f,i)=>setTimeout(()=>tone(f,.16,'sine',.12),i*60)); },
  happy(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.18,'triangle',.16),i*90)); },
  yum(){ [659,784,988,1319].forEach((f,i)=>setTimeout(()=>tone(f,.22,'sine',.18),i*110)); },
  squeak(){ tone(1200,.07,'square',.10); setTimeout(()=>tone(1500,.07,'square',.10),70); },
  splash(){ tone(300,.18,'sawtooth',.10); tone(180,.22,'sine',.08); },
  woof(){ tone(220,.12,'sawtooth',.16); setTimeout(()=>tone(180,.14,'sawtooth',.14),120); },
  meow(){ tone(620,.18,'sine',.14); setTimeout(()=>tone(520,.18,'sine',.12),160); },
  party(){ const n=[523,659,784,659,784,1047,988,1047]; n.forEach((f,i)=>setTimeout(()=>tone(f,.16,'triangle',.15),i*130)); }
};
/* =========================================================================
   VOICE NARRATION — built-in browser speech (offline, no files, free).
   Lets a pre-reader play alone: names colors, counts, greets by name.
   Obeys the same mute button as the sound effects.
   ========================================================================= */
let VOICE=null;
function pickVoice(){ try{ const vs=window.speechSynthesis.getVoices(); if(!vs||!vs.length)return;
  const pref=['Samantha','Karen','Moira','Tessa','Victoria','Fiona','Google UK English Female','Google US English'];
  VOICE = vs.find(v=>pref.indexOf(v.name)>=0) || vs.find(v=>/female/i.test(v.name)) || vs.find(v=>/^en/i.test(v.lang)) || vs[0];
 }catch(e){} }
try{ if(window.speechSynthesis){ pickVoice(); window.speechSynthesis.onvoiceschanged=pickVoice; } }catch(e){}

/* =========================================================================
   FX (vector sprites)
   ========================================================================= */
function spriteAt(x,y,svg,anim='floatUp',size=34){
  const el=document.createElement('div'); el.className='fx'; el.innerHTML=svg;
  el.style.width=size+'px'; el.style.height=size+'px';
  el.style.left=(x-size/2)+'px'; el.style.top=(y-size/2)+'px';
  el.style.animation=anim+' 1.1s ease-out forwards';
  document.body.appendChild(el); setTimeout(()=>el.remove(),1150);
}
function hearts(x,y,n=5){ for(let i=0;i<n;i++)setTimeout(()=>spriteAt(x+(Math.random()*60-30),y,ICON.heart(),'floatUp',30),i*90); }
function sparkles(x,y,n=6){ for(let i=0;i<n;i++)setTimeout(()=>spriteAt(x+(Math.random()*80-40),y+(Math.random()*40-20), i%2?ICON.sparkle():ICON.star(),'pop',26),i*60); }
function confetti(n=60){
  const cols=['#ff5fa2','#ffd23f','#5fd6b4','#6aa6ff','#ff8a3d','#b79cff'];
  for(let i=0;i<n;i++){ const el=document.createElement('div'); el.className='fx';
    if(i%5===0){ el.innerHTML=ICON.heart(cols[i%cols.length]); el.style.width='22px'; el.style.height='22px'; }
    else if(i%5===1){ el.innerHTML=ICON.star(cols[i%cols.length]); el.style.width='22px'; el.style.height='22px'; }
    else { el.style.width=(8+Math.random()*8)+'px'; el.style.height=(12+Math.random()*8)+'px';
      el.style.background=cols[i%cols.length]; el.style.borderRadius='3px'; }
    el.style.left=Math.random()*100+'vw'; el.style.top='-40px';
    el.style.animation=`confettiFall ${1.6+Math.random()*1.4}s linear forwards`; el.style.animationDelay=(Math.random()*.6)+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),3800); }
}
function toast(txt){
  const t=document.createElement('div'); t.className='toast'; t.textContent=txt;
  t.style.animation='toastPop 1.6s ease forwards'; document.body.appendChild(t);
  setTimeout(()=>t.remove(),1650);
}

/* swatch row: items are color strings OR [value, svgMarkup] for icon swatches */
function swatchRow(items, getSel, onPick, mode){
  const wrap=el('<div class="swatches"></div>');
  items.forEach(it=>{
    const val=Array.isArray(it)?it[0]:it;
    const s=el('<div class="sw"></div>');
    if(Array.isArray(it)){ s.innerHTML=it[1]; }
    else { s.style.background=val; }
    if(getSel()===val) s.classList.add('sel');
    s.addEventListener('click',()=>{ S.pop(); onPick(val);
      if(typeof val==='string'&&val.charAt(0)==='#') sayColor(val);
      wrap.querySelectorAll('.sw').forEach(x=>x.classList.remove('sel')); s.classList.add('sel'); });
    wrap.appendChild(s);
  });
  return wrap;
}

        s.addEventListener('click',ev=>{ S.pop(); toppings.push(svg); sayCount(toppings.length); spriteAt(ev.clientX,ev.clientY,svg,'pop',28); render(); }); tw.appendChild(s); });
      tray.appendChild(tw);

  /* sticker shelf — tap a sticker (speaks), then tap the wall; same swatch cancels */
  const stkWrap=el('<div class="swatches" style="justify-content:center;"></div>');
  function deselect(){ selStk=null; stkWrap.querySelectorAll('.sw').forEach(x=>x.classList.remove('sel')); }
  STK.forEach(([k,svg])=>{ const s=el(`<div class="sw">${svg}</div>`);
    s.addEventListener('click',()=>{ if(selStk===k){ S.tap(); deselect(); say('Okay!'); }
      else { S.pop(); deselect(); selStk=k; s.classList.add('sel'); say('Now tap the wall!'); } });
    stkWrap.appendChild(s); });
  r.querySelector('#stkRow').appendChild(stkWrap);
  /* ONE delegated capture handler on the scene — stickers live inside the bg SVG under the
     full-bleed stagecanvas, so taps are mapped through getScreenCTM, never wired per-sticker */
  const sceneEl=r.querySelector('#bedScene');
  sceneEl.addEventListener('click',ev=>{
    if(ev.target.closest('.roomname')){ if(selStk) say('Put it on the wall!'); return; }
    if(ev.target.closest('#bedCanvas svg')){ if(selStk) say('Put it on the wall!'); return; }
    const svg=bg.querySelector('svg'); if(!svg)return;
    let pt; try{ pt=new DOMPoint(ev.clientX,ev.clientY).matrixTransform(svg.getScreenCTM().inverse()); }catch(e){ return; }
    if(selStk){
      if(pt.x<10||pt.x>390||pt.y<90||pt.y>430){ say('Put it on the wall!'); return; }
      if(G.bedroom.stickers.length>=20){ say('The wall is full! Pop one first.'); deselect(); return; }
      const k=selStk;
      if(commit(()=>{ G.bedroom.stickers.push({k:k,x:Math.round(pt.x),y:Math.round(pt.y)}); })){
        S.pop(); paint(); spriteAt(ev.clientX,ev.clientY,ICON.sparkle(),'pop',24); }
    } else {
      let bi=-1,bd=1e9;
      G.bedroom.stickers.forEach((s,i)=>{ const d=Math.hypot(s.x-pt.x,s.y-pt.y); if(d<bd){bd=d;bi=i;} });
      if(bi>=0&&bd<=28){
        if(commit(()=>{ G.bedroom.stickers.splice(bi,1); })){
          S.pop(); say('Pop!'); paint(); spriteAt(ev.clientX,ev.clientY,ICON.sparkle(),'pop',24); } }
    }
  },true);
  return r;
}

/* Stored doll state is re-validated before render: localStorage is user-writable, so every
   value is whitelisted (hex colors, registry-known styles, boolean accessories) — renderDoll
   then only ever interpolates values the game itself could have produced. */
function cleanDoll(d){
  d=(d&&typeof d==='object')?d:{};
  const hex=v=>(typeof v==='string'&&/^#[0-9a-fA-F]{3,8}$/.test(v));
  const out={};
  out.skin=hex(d.skin)?d.skin:DEFAULT.doll.skin;
  out.hairColor=hex(d.hairColor)?d.hairColor:DEFAULT.doll.hairColor;
  out.outfitColor=hex(d.outfitColor)?d.outfitColor:DEFAULT.doll.outfitColor;
  out.shoes=hex(d.shoes)?d.shoes:DEFAULT.doll.shoes;
  out.lip=hex(d.lip)?d.lip:DEFAULT.doll.lip;
  out.hair=HAIRSTYLE.some(h=>h[0]===d.hair)?d.hair:DEFAULT.doll.hair;
  out.outfit=OUTFIT.some(o=>o[0]===d.outfit)?d.outfit:DEFAULT.doll.outfit;
  out.accessories={}; const acc=(d.accessories&&typeof d.accessories==='object')?d.accessories:{};
  Object.keys(DEFAULT.doll.accessories).forEach(k=>out.accessories[k]=!!acc[k]);
  return out;
}

function roomHome(){
  const night=G.bedroom.time==='night';
  const r=el(`<div class="room"><div class="scene" id="homeScene"><div class="sceneBg" id="homeBg">${sceneHome(night)}</div></div></div>`);
  /* the letterbox bands show the scene div: sky above, ground below the 80% line (480/600) */
  r.querySelector('#homeScene').style.background = night
    ? 'linear-gradient(#1d1640 0%,#2b2356 80%,#1f3322 80%)'
    : 'linear-gradient(#bfe9ff 0%,#e7f7ff 80%,#9bd97a 80%)';
  const bg=r.querySelector('#homeBg');
  let elevFloor=0; const stops=[0,-114,-228];
  r.querySelector('#homeScene').addEventListener('click',ev=>{
    const svg=bg.querySelector('svg'); if(!svg)return;
    let pt; try{ pt=new DOMPoint(ev.clientX,ev.clientY).matrixTransform(svg.getScreenCTM().inverse()); }
    catch(e){ S.sparkle(); sparkles(ev.clientX,ev.clientY,3); return; }   /* never silent, even on a CTM hiccup */
    const hit=t=>pt.x>=t.x&&pt.x<=t.x+t.w&&pt.y>=t.y&&pt.y<=t.y+t.h;
    const toy=HOME_TOYS.find(hit);
    if(toy){
      if(toy.id==='elev'){
        const prev=elevFloor; elevFloor=(elevFloor+1)%3;
        const car=bg.querySelector('#elevCar'); if(car)car.style.transform=`translateY(${stops[elevFloor]}px)`;
        tone(660,.12,'sine',.14); setTimeout(()=>tone(880,.14,'sine',.14),150);
        say(elevFloor>prev?'Going up!':'Going down!');
        bg.querySelectorAll('.winF'+(elevFloor+1)).forEach(w=>{ w.classList.add('glowOnce'); setTimeout(()=>w.classList.remove('glowOnce'),1900); });
      } else if(toy.id==='bell'){
        tone(784,.18,'sine',.16); setTimeout(()=>tone(523,.22,'sine',.16),190);
        say("Ding dong! Who's there?");
        setTimeout(()=>{ if(!bg.isConnected)return;   /* she may have left the room mid-ding */
          S[G.pet==='dog'?'woof':'meow'](); const p=bg.querySelector('#yardPet');
          if(p){ const rc=p.getBoundingClientRect(); hearts(rc.left+rc.width/2,rc.top,3); } },900);
      } else if(toy.id==='mail'){
        S.pop(); say('You have mail!'); spriteAt(ev.clientX,ev.clientY,ICON.heart('#ff5fa2'),'floatUp',30);
      }

    S.sparkle(); sparkles(ev.clientX,ev.clientY,4);   /* the house answers every touch */
  });
  return r;
}

/* =========================================================================
   GROWN-UP GATE — the only way to erase the world.
   Hidden entry: hold the tiny version mark (top-right) for 2s. Then hold the star 3s
   (strict pointer discipline), then a parent-readable confirm. A child's
   mash-taps and hold-and-watch both fail; "Go back to playing" always exits.
   ========================================================================= */
(function(){
  const hit=document.getElementById('gateHit'), ovl=document.getElementById('gateOverlay');
  const star=document.getElementById('holdStar'), fillEl=document.getElementById('holdFill');
  const confirmRow=document.getElementById('gateConfirm');
  let lpT=null, holdT=null, holdIv=null, activeId=null, idleT=null;
  function armIdle(){ clearTimeout(idleT); idleT=setTimeout(closeGate,10000); }
  function openGate(){ confirmRow.style.display='none'; fillEl.style.height='0%'; ovl.classList.add('on');
    say('Ask a grown-up for help!'); armIdle(); }
  function closeGate(){ ovl.classList.remove('on'); abortHold(); clearTimeout(idleT); }
  function abortHold(){ clearTimeout(holdT); clearInterval(holdIv); holdT=null; holdIv=null; activeId=null; fillEl.style.height='0%'; }
  hit.addEventListener('pointerdown',()=>{ clearTimeout(lpT); lpT=setTimeout(openGate,2000); });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>hit.addEventListener(ev,()=>clearTimeout(lpT)));
  ovl.addEventListener('pointerdown',armIdle);
  ovl.addEventListener('click',e=>{ if(e.target===ovl)closeGate(); });
  document.getElementById('gateBack').addEventListener('click',()=>{ S.tap(); closeGate(); });
  star.addEventListener('pointerdown',e=>{
    if(activeId!==null){ abortHold(); return; }          /* a second touch aborts */
    activeId=e.pointerId; try{ star.setPointerCapture(e.pointerId); }catch(_){}
    let p=0; fillEl.style.height='0%';
    holdIv=setInterval(()=>{ p+=4; fillEl.style.height=Math.min(100,p)+'%'; },120);
    holdT=setTimeout(()=>{ abortHold(); fillEl.style.height='100%'; S.sparkle(); confirmRow.style.display='flex'; armIdle(); },3000);
  });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>star.addEventListener(ev,e=>{ if(e.pointerId===activeId)abortHold(); }));
  window.addEventListener('blur',abortHold);
  document.getElementById('gateYes').addEventListener('click',()=>{ Store.set('game',{}); location.reload(); });
})();
